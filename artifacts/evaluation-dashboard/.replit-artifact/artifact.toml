kind = "web"
previewPath = "/"
title = "Evaluation Dashboard"
version = "1.0.0"
id = "artifacts/evaluation-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24550

[services.development]
run = "pnpm --filter @workspace/evaluation-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/evaluation-dashboard", "run", "build" ]
publicDir = "artifacts/evaluation-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24550"
BASE_PATH = "/"
